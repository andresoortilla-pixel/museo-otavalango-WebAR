<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Otavalango AR - MindAR Funcional</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }

      #start-btn {
        padding: 16px 40px; font-size: 18px;
        background: #28a745; color: white;
        border: none; border-radius: 12px;
        cursor: pointer;
      }

      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        z-index: 9998; background: rgba(0,0,0,0.7); color: white;
        font-size: 14px; padding: 12px; border-radius: 8px;
        font-family: sans-serif; text-align: center; pointer-events: none;
      }
    </style>
  </head>

  <body>

    <div id="overlay">
      <button id="start-btn">📷 Dar permisos y Comenzar</button>
    </div>

    <div id="status">⏳ Cargando cámara...</div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/espectro; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video
          id="mi-video"
          src="./assets/espectro"
          preload="auto"
          loop  playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#mi-video"
          width="1" height="1.777"
          position="0 0 0">
        </a-video>
      </a-entity>

    </a-scene>

    <script>
      const overlayEl = document.getElementById("overlay");
      const startBtn  = document.getElementById("start-btn");
      const videoEl   = document.getElementById("mi-video");
      const statusEl  = document.getElementById("status");
      const target    = document.querySelector("[mindar-image-target]");

      // Cuando el usuario hace clic, desbloqueamos el video y ocultamos la pantalla negra
      startBtn.addEventListener("click", function () {
        overlayEl.style.display = "none";
        statusEl.innerText = "📷 Apunta la cámara a la imagen del Telar...";
        
        // Truco de desbloqueo de video
        videoEl.play().then(function () {
          videoEl.pause();
        }).catch(function (error) {
          console.log("Error al pre-cargar video:", error);
        });
      });

      // Eventos de rastreo de la imagen
      target.addEventListener("targetFound", function () {
        statusEl.style.background = "rgba(0,140,0,0.88)";
        statusEl.innerText = "🟢 ¡Imagen detectada! Reproduciendo video...";
        videoEl.play();
      });

      target.addEventListener("targetLost", function () {
        statusEl.style.background = "rgba(0,0,0,0.7)";
        statusEl.innerText = "📷 Apunta la cámara a la imagen del Telar...";
        videoEl.pause();
      });
    </script>

  </body>
</html>
